<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Simulator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>RPS Simulator</h1>
            <p>Watch the ancient battle unfold</p>
        </header>

        <main class="simulation-area">
            <div class="canvas-container">
                <canvas id="simCanvas"></canvas>
                <canvas id="chartCanvas" class="chart-overlay"></canvas>
            </div>
            
            <aside class="controls-panel glassmorphism">
                <h2>Controls</h2>
                
                <div class="stats-section">
                    <div class="stat-item rock-stat">
                        <span class="emoji">🪨</span>
                        <span id="rockCount" class="count">0</span>
                    </div>
                    <div class="stat-item paper-stat">
                        <span class="emoji">📄</span>
                        <span id="paperCount" class="count">0</span>
                    </div>
                    <div class="stat-item scissors-stat">
                        <span class="emoji">✂️</span>
                        <span id="scissorsCount" class="count">0</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Spawn Entities</label>
                    <div class="spawn-buttons">
                        <button id="btnSpawnRock" class="btn btn-rock">Add 🪨</button>
                        <button id="btnSpawnPaper" class="btn btn-paper">Add 📄</button>
                        <button id="btnSpawnScissors" class="btn btn-scissors">Add ✂️</button>
                        <button id="btnSpawnRandom" class="btn btn-random">Add Mix</button>
                    </div>
                </div>

                <div class="control-group">
                    <label for="speedSlider">Simulation Speed: <span id="speedValue">1x</span></label>
                    <input type="range" id="speedSlider" min="0.1" max="5" step="0.1" value="1">
                </div>
                
                <div class="control-group">
                    <label for="sizeSlider">Entity Size: <span id="sizeValue">24px</span></label>
                    <input type="range" id="sizeSlider" min="12" max="64" step="2" value="24">
                </div>

                <button id="btnReset" class="btn btn-reset">Reset Simulation</button>
            </aside>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
