<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Simulator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>RPS Simulator</h1>
            <p>Watch the ancient battle unfold</p>
            <div class="view-controls">
                <button class="view-btn active" id="btnViewStandard" title="Standard view">
                    <svg width="20" height="14" viewBox="0 0 20 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="0.5" y="0.5" width="19" height="13" rx="1.5" stroke="currentColor"/>
                        <rect x="13" y="8" width="6" height="5" rx="1" fill="currentColor"/>
                    </svg>
                </button>
                <button class="view-btn" id="btnViewSplit" title="Split view">
                    <svg width="20" height="14" viewBox="0 0 20 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="0.5" y="0.5" width="8.5" height="13" rx="1.5" stroke="currentColor"/>
                        <rect x="11" y="0.5" width="8.5" height="13" rx="1.5" stroke="currentColor"/>
                    </svg>
                </button>
                <button class="view-btn" id="btnViewInverted" title="Inverted view">
                    <svg width="20" height="14" viewBox="0 0 20 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="0.5" y="0.5" width="19" height="13" rx="1.5" stroke="currentColor"/>
                        <rect x="1" y="8" width="6" height="5" rx="1" fill="currentColor"/>
                    </svg>
                </button>
            </div>
        </header>

        <main class="simulation-area">
            <div class="views-wrapper">
                <div class="canvas-container sim-container">
                    <canvas id="simCanvas"></canvas>
                </div>
                <div class="chart-container">
                    <canvas id="chartCanvas"></canvas>
                </div>
            </div>
            
            <aside class="controls-panel glassmorphism">
                <h2>Controls</h2>
                
                <div class="stats-section">
                    <div class="stat-item rock-stat">
                        <span class="emoji">🪨</span>
                        <span id="rockCount" class="count">0</span>
                    </div>
                    <div class="stat-item paper-stat">
                        <span class="emoji">📄</span>
                        <span id="paperCount" class="count">0</span>
                    </div>
                    <div class="stat-item scissors-stat">
                        <span class="emoji">✂️</span>
                        <span id="scissorsCount" class="count">0</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Spawn Entities</label>
                    <div class="spawn-buttons">
                        <button id="btnSpawnRock" class="btn btn-rock">Add 🪨</button>
                        <button id="btnSpawnPaper" class="btn btn-paper">Add 📄</button>
                        <button id="btnSpawnScissors" class="btn btn-scissors">Add ✂️</button>
                        <button id="btnSpawnRandom" class="btn btn-random">Add Mix</button>
                    </div>
                </div>

                <div class="control-group">
                    <label for="speedSlider">Simulation Speed: <span id="speedValue">1x</span></label>
                    <input type="range" id="speedSlider" min="0.1" max="5" step="0.1" value="1">
                </div>
                
                <div class="control-group">
                    <label for="sizeSlider">Entity Size: <span id="sizeValue">24px</span></label>
                    <input type="range" id="sizeSlider" min="12" max="64" step="2" value="24">
                </div>

                <button id="btnReset" class="btn btn-reset">Reset Simulation</button>
            </aside>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
